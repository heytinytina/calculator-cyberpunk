<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="calculator.css">
</head>
<body>
  <main class="app">
    <section class="calculator" role="region" aria-label="Calculator">

      <div class="display" aria-live="polite" aria-atomic="true">
        <div id="expression" class="display__expression" aria-label="Expression in progress"></div>
        <div id="current"    class="display__current"    aria-label="Current value">0</div>
      </div>

      <div class="buttons" role="group" aria-label="Calculator buttons">

        <!-- Row 1: utility -->
        <button class="btn btn--utility btn--span2" data-action="clear"     aria-label="Clear">C</button>
        <button class="btn btn--utility btn--span2" data-action="backspace" aria-label="Backspace">⌫</button>

        <!-- Row 2 -->
        <button class="btn" data-digit="7">7</button>
        <button class="btn" data-digit="8">8</button>
        <button class="btn" data-digit="9">9</button>
        <button class="btn btn--operator" data-op="÷" aria-label="Divide">÷</button>

        <!-- Row 3 -->
        <button class="btn" data-digit="4">4</button>
        <button class="btn" data-digit="5">5</button>
        <button class="btn" data-digit="6">6</button>
        <button class="btn btn--operator" data-op="×" aria-label="Multiply">×</button>

        <!-- Row 4 -->
        <button class="btn" data-digit="1">1</button>
        <button class="btn" data-digit="2">2</button>
        <button class="btn" data-digit="3">3</button>
        <button class="btn btn--operator" data-op="−" aria-label="Subtract">−</button>

        <!-- Row 5 -->
        <button class="btn" data-digit="0">0</button>
        <button class="btn" data-action="decimal" aria-label="Decimal point">.</button>
        <button class="btn btn--equals"   data-action="equals"   aria-label="Equals">=</button>
        <button class="btn btn--operator" data-op="+"            aria-label="Add">+</button>

      </div>
    </section>
  </main>

  <script src="calculator.js"></script>
  <script src="celebration.js"></script>
</body>
</html>
